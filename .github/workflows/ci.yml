name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Compatibility Checks
        run: ./gradlew compatibilityCheck --no-daemon

      - name: Lockfile Policy Check
        run: ./gradlew lockfileCheck --no-daemon
